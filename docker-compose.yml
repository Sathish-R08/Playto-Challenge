services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
      POSTGRES_DB: playto
    ports:
      - "5432:5432"
    volumes:
      - playto_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  playto_pg:
