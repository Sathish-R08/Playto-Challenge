# Render Blueprint — https://render.com/docs/blueprint-spec
#
# After deploy: Web Shell on playto-api →
#   python manage.py migrate --noinput && python manage.py seed_playto
#
# Prompts (sync: false): set DJANGO_ALLOWED_HOSTS to API hostname only;
# CORS_ALLOWED_ORIGINS to your static site URL(s). Set VITE_API_BASE_URL on
# the static site to your public API URL (https://playto-api.onrender.com).

envVarGroups:
  - name: playto-django-shared
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: playto-postgres
    databaseName: playto
    user: playto

services:
  - type: keyvalue
    name: playto-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow connections (tighten in production if needed)

  - type: web
    name: playto-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - fromGroup: playto-django-shared
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_DEBUG
        value: "false"
      - key: CORS_ALLOW_ALL
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: playto-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: playto-redis
          type: keyvalue
          property: connectionString

  - type: worker
    name: playto-celery-worker
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info
    envVars:
      - fromGroup: playto-django-shared
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_DEBUG
        value: "false"
      - key: CORS_ALLOW_ALL
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: playto-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: playto-redis
          type: keyvalue
          property: connectionString

  - type: worker
    name: playto-celery-beat
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config beat -l info
    envVars:
      - fromGroup: playto-django-shared
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_DEBUG
        value: "false"
      - key: CORS_ALLOW_ALL
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: playto-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: playto-redis
          type: keyvalue
          property: connectionString

  - type: web
    name: playto-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_MERCHANT_API_KEY
        value: demo-token-alpha
